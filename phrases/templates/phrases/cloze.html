{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLOZE | Blüdhaven</title>
  <link rel="stylesheet" href="{% static 'phrases/css/phrases_base.css' %}">
  <style>
    .container { max-width: 900px; margin: 5rem auto; padding: 0 2rem; text-align: center; }
    .card-meta {
      font-size: 0.75rem; color: var(--gray); letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 2rem;
    }
    .phrase-hero {
      font-family: 'Noto Sans KR'; font-size: 2.2rem; font-weight: 500;
      line-height: 1.5; margin-bottom: 1rem;
    }
    .phrase-blank {
      display: inline-block; border-bottom: 3px solid var(--accent);
      min-width: 100px; color: transparent; background: #f5ede9;
      border-radius: 2px; vertical-align: bottom;
    }
    .phrase-ko { font-size: 1rem; color: var(--gray); margin-bottom: 3rem; }
    .answer-box {
      display: none; margin-top: 2rem; padding-top: 3rem;
      border-top: 1px solid var(--navy); animation: fadeIn 0.6s ease;
    }
    .answer-phrase {
      font-family: 'Noto Sans KR'; font-size: 1.8rem; font-weight: 500; margin-bottom: 1rem;
    }
    .answer-input-area { margin-top: 2rem; display: flex; justify-content: center; gap: 1rem; }
    .answer-input {
      padding: 0.8rem 1.5rem; border: 1px solid var(--line); font-size: 1rem;
      width: 340px; font-family: 'Inter', sans-serif; background: #fff;
    }
    .answer-input:focus { outline: none; border-color: var(--accent); }
    .btn-group { margin-top: 3rem; display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; }
    .btn-correct { background: #F0FDF4; color: #166534; border: 1px solid #BBF7D0; }
    .btn-wrong   { background: #FEF2F2; color: #991B1B; border: 1px solid #FECACA; }
    .tag {
      display: inline-block; font-size: 0.7rem; background: var(--line);
      padding: 0.2rem 0.6rem; color: var(--gray); margin: 0 0.2rem;
    }
    .empty-cta { padding-top: 3rem; }
  </style>
</head>
<body>
  <header>
    <a href="{% url 'index' %}" class="logo">Blüdhaven</a>
    <nav>
      <a href="{% url 'phrases:home' %}">PHRASES</a>
      <a href="{% url 'phrases:cloze' %}" class="active">CLOZE</a>
      <a href="{% url 'phrases:scramble' %}">SCRAMBLE</a>
      <a href="{% url 'phrases:stats' %}">STATS</a>
    </nav>
  </header>

  <div class="container">
    <h2 class="page-title">Cloze Study</h2>
    <p class="card-meta">빈칸에 알맞은 표현을 입력하세요</p>

    <div id="cloze-area">
      <p class="empty-state">카드를 불러오는 중...</p>
    </div>

    <div id="result-area" style="margin-top:2rem;"></div>

    <div class="btn-group">
      <button class="btn btn-primary" id="checkBtn" style="display:none;" onclick="checkAnswer()">확인</button>
      <button class="btn btn-correct" id="nextBtnCorrect" style="display:none;" onclick="loadNextCard()">다음 카드 →</button>
      <button class="btn btn-wrong" id="nextBtnWrong" style="display:none;" onclick="loadNextCard()">다음 카드 →</button>
    </div>
  </div>

  <script>
  const CSRF = '{{ csrf_token }}';
  let currentCard = null;

  async function loadNextCard() {
    document.getElementById('result-area').innerHTML = '';
    document.getElementById('nextBtnCorrect').style.display = 'none';
    document.getElementById('nextBtnWrong').style.display = 'none';
    document.getElementById('checkBtn').style.display = 'none';
    window._startTime = Date.now();

    const res = await fetch("{% url 'phrases:api_cards_due' %}?mode=cloze&limit=1");
    const data = await res.json();

    if (!data.count) {
      document.getElementById('cloze-area').innerHTML =
        '<p class="empty-state">오늘 복습할 카드가 없어요. 잘 하셨습니다! 🎉</p>';
      return;
    }

    currentCard = data.cards[0];
    const cloze = currentCard.cloze_data;
    const blanked = (cloze.segments || []).map(seg => {
      if (seg.type === 'blank') {
        const len = (typeof seg.answer === 'string') ? seg.answer.length : 6;
        return `<span class="phrase-blank">${'\u00a0'.repeat(Math.max(len, 6))}</span>`;
      }
      return (seg.value || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    }).join('') || currentCard.phrase;
    const tags = currentCard.tags.map(t =>
      `<span class="tag">${t.name}</span>`).join('');

    document.getElementById('cloze-area').innerHTML = `
      <div class="card-meta">Box ${currentCard.box_number}${tags ? ' · ' + tags : ''}</div>
      <div class="phrase-hero">${blanked}</div>
      <div class="phrase-ko">${currentCard.phrase_ko || ''}</div>
      <div class="answer-input-area">
        <input type="text" id="answer-input" class="answer-input"
               placeholder="정답을 입력하세요"
               onkeydown="if(event.key==='Enter') checkAnswer()">
      </div>
    `;
    document.getElementById('checkBtn').style.display = 'inline-block';
  }

  async function checkAnswer() {
    const input = document.getElementById('answer-input');
    const userAnswer = input.value.trim();
    if (!userAnswer) return;

    const responseMs = Date.now() - window._startTime;

    const correct = currentCard.phrase;
    const isMatch = userAnswer.toLowerCase() === correct.toLowerCase();
    const result = isMatch ? 'good' : 'again';

    let data = {};
    try {
      const res = await fetch("{% url 'phrases:api_review' %}", {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
        body: JSON.stringify({ card_id: currentCard.id, result: result, response_ms: responseMs }),
      });
      data = await res.json();
    } catch (e) {
      document.getElementById('result-area').innerHTML =
        '<div class="result-wrong">서버 오류가 발생했습니다. 다시 시도해 주세요.</div>';
      return;
    }

    const el = document.getElementById('result-area');
    if (isMatch) {
      const pts = data.points_earned ? ` (+${data.points_earned} pts)` : '';
      el.innerHTML = `<div class="result-correct">✓ 정답입니다!${pts}</div><div class="phrase-hero">${correct}</div>`;
      document.getElementById('nextBtnCorrect').style.display = 'inline-block';
    } else {
      el.innerHTML = `<div class="result-wrong">✗ 오답 — 정답: <strong>${correct}</strong></div>`;
      document.getElementById('nextBtnWrong').style.display = 'inline-block';
    }

    document.getElementById('checkBtn').style.display = 'none';
  }

  loadNextCard();
  </script>
  <script>
  (async function() {
    try {
      const res = await fetch('/api/mainpage/fonts', { credentials: 'same-origin' });
      const payload = await res.json();
      if (!payload.ok || !Array.isArray(payload.data)) return;
      for (const font of payload.data) {
        if (!font.url) continue;
        const id = 'bh-font-' + font.id;
        if (document.getElementById(id)) continue;
        const ff = String(font.font_family).replace(/['"\\]/g, '');
        const url = String(font.url).replace(/['"\\]/g, '');
        const fmt = font.format ? ` format('${String(font.format).replace(/['"\\]/g, '')}')` : '';
        const style = document.createElement('style');
        style.id = id;
        style.textContent = `@font-face { font-family: '${ff}'; src: url('${url}')${fmt}; font-display: swap; }`;
        document.head.appendChild(style);
      }
    } catch {}
  })();
  </script>
</body>
</html>
