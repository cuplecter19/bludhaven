{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCRAMBLE | Blüdhaven</title>
  <link rel="stylesheet" href="{% static 'phrases/css/phrases_base.css' %}">
  <link rel="stylesheet" href="{% static 'phrases/css/scramble.css' %}">
</head>
<body>
  <header>
    <a href="{% url 'index' %}" class="logo">Blüdhaven</a>
    <nav>
      <a href="{% url 'phrases:home' %}">PHRASES</a>
      <a href="{% url 'phrases:cloze' %}">CLOZE</a>
      <a href="{% url 'phrases:scramble' %}" class="active">SCRAMBLE</a>
      <a href="{% url 'phrases:stats' %}">STATS</a>
    </nav>
  </header>

  <div class="container">
    <h2 class="page-title">Scramble</h2>
    <p class="card-meta">단어를 클릭해 올바른 어순으로 배열하세요</p>

    <div id="scramble-area">
      <p class="empty-state">카드를 불러오는 중...</p>
    </div>

    <div id="answer-track" class="answer-track hidden"></div>

    <div class="btn-group hidden" id="action-btns">
      <button class="btn btn-reset" onclick="resetTokens()">RESET</button>
      <button class="btn btn-primary" onclick="submitScramble()">SUBMIT</button>
    </div>

    <div id="result-area" class="result-area"></div>
    <div id="answer-reveal" class="answer-reveal hidden"></div>

    <div class="next-btn-area">
      <button class="btn btn-accent hidden" id="nextBtn" onclick="loadNextCard()">다음 카드 →</button>
    </div>
  </div>

  <script>
  const CSRF = '{{ csrf_token }}';
  let currentCard = null;
  let scrambledWords = [];
  let selectedOrder = [];
  let startTime = Date.now();

  async function loadNextCard() {
    document.getElementById('result-area').innerHTML = '';
    document.getElementById('answer-reveal').classList.add('hidden');
    document.getElementById('nextBtn').classList.add('hidden');
    document.getElementById('answer-track').classList.add('hidden');
    document.getElementById('action-btns').classList.add('hidden');
    selectedOrder = [];

    const res = await fetch("{% url 'phrases:api_cards_due' %}?mode=scramble&limit=1");
    const data = await res.json();

    if (!data.count) {
      document.getElementById('scramble-area').innerHTML =
        '<p class="empty-state">오늘 복습할 카드가 없어요. 잘 하셨습니다! 🎉</p>';
      return;
    }

    currentCard = data.cards[0];
    scrambledWords = currentCard.scramble_data.shuffled || [];
    startTime = Date.now();

    const tags = currentCard.tags.map(t => `<span class="tag">${t.name}</span>`).join('');
    document.getElementById('scramble-area').innerHTML = `
      <div class="card-meta">Box ${currentCard.box_number}${tags ? ' · ' + tags : ''}</div>
      <div class="phrase-ko">${currentCard.phrase_ko || ''}</div>
      <div id="word-bank" class="word-bank">${scrambledWords.map((w, i) =>
        `<span class="word-token" data-index="${i}" onclick="selectWord(this)">${w}</span>`
      ).join('')}</div>
    `;
    document.getElementById('answer-track').innerHTML = '';
    document.getElementById('answer-track').classList.remove('hidden');
    document.getElementById('action-btns').classList.remove('hidden');
  }

  function selectWord(el) {
    el.classList.add('selected');
    el.onclick = null;
    const word = el.textContent;
    const entryIndex = selectedOrder.length;
    selectedOrder.push(word);

    const track = document.getElementById('answer-track');
    const token = document.createElement('span');
    token.className = 'word-token';
    token.textContent = word;
    token.onclick = () => removeFromTrack(token, el, entryIndex);
    track.appendChild(token);
  }

  function removeFromTrack(trackToken, sourceEl, entryIndex) {
    trackToken.remove();
    selectedOrder.splice(entryIndex, 1);
    sourceEl.classList.remove('selected');
    sourceEl.onclick = () => selectWord(sourceEl);
  }

  function resetTokens() {
    selectedOrder = [];
    document.getElementById('answer-track').innerHTML = '';
    document.querySelectorAll('.word-token').forEach(t => {
      t.classList.remove('selected');
      t.onclick = () => selectWord(t);
    });
  }

  async function submitScramble() {
    const timeTakenMs = Date.now() - startTime;
    const res = await fetch("{% url 'phrases:api_scramble' %}", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
      body: JSON.stringify({ card_id: currentCard.id, submitted_order: selectedOrder, time_taken_ms: timeTakenMs }),
    });
    const data = await res.json();

    document.getElementById('action-btns').classList.add('hidden');
    const el = document.getElementById('result-area');
    if (data.is_correct) {
      const pts = data.points_earned ? ` (+${data.points_earned} pts)` : '';
      el.innerHTML = `<div class="result-correct">✓ 정답입니다!${pts}</div>`;
    } else {
      el.innerHTML = '<div class="result-wrong">✗ 오답입니다.</div>';
    }

    const rev = document.getElementById('answer-reveal');
    rev.innerHTML = `<div class="phrase">${data.correct_order.join(' ')}</div>`;
    rev.classList.remove('hidden');
    document.getElementById('nextBtn').classList.remove('hidden');
  }

  loadNextCard();
  </script>
  <script>
  (async function() {
    try {
      const res = await fetch('/api/mainpage/fonts', { credentials: 'same-origin' });
      const payload = await res.json();
      if (!payload.ok || !Array.isArray(payload.data)) return;
      for (const font of payload.data) {
        if (!font.url) continue;
        const id = 'bh-font-' + font.id;
        if (document.getElementById(id)) continue;
        const ff = String(font.font_family).replace(/['"\\]/g, '');
        const url = String(font.url).replace(/['"\\]/g, '');
        const fmt = font.format ? ` format('${String(font.format).replace(/['"\\]/g, '')}')` : '';
        const style = document.createElement('style');
        style.id = id;
        style.textContent = `@font-face { font-family: '${ff}'; src: url('${url}')${fmt}; font-display: swap; }`;
        document.head.appendChild(style);
      }
    } catch {}
  })();
  </script>
</body>
</html>
