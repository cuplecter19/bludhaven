services:
  db:
    image: postgres:16
    volumes:
      - ./data/db:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=toybox_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password123
    restart: always

  web:
    build: .  # 방금 만든 Dockerfile을 읽어서 빌드합니다
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "80:8000"
    depends_on:
      - db