{% extends "atelier/base.html" %}
{% load static %}

{% block title %}기분 기록 — Pulse{% endblock %}

{% block content %}
<div class="checkin-layout">
  <a class="back-link" href="{% url 'atelier:pulse_home' %}">← Pulse</a>
  <h2>오늘 기분은 어때요?</h2>

  <div class="slider-group">
    <label for="mood-slider">기분 <span id="mood-val">5</span></label>
    <input id="mood-slider" class="mood-slider" type="range" min="1" max="10" value="5">
  </div>

  <div class="slider-group">
    <label for="energy-slider">에너지 <span id="energy-val">5</span> <small>(선택)</small></label>
    <input id="energy-slider" class="mood-slider" type="range" min="1" max="10" value="5">
  </div>

  <div class="emotion-tags-group">
    <p>감정 태그 (선택)</p>
    <div class="emotion-tag-buttons">
      {% for tag in emotion_tags %}
      <button class="emotion-tag-btn" data-tag="{{ tag }}">{{ tag }}</button>
      {% endfor %}
    </div>
  </div>

  <div class="behavior-tags-group">
    <p class="behavior-tags-title">오늘 어떤 패턴이 있었나요?</p>
    <p class="behavior-tags-hint">고르지 않아도 괜찮아요.</p>
    <div class="behavior-tag-buttons">
      {% for tag in behavior_tags %}
      <button class="behavior-tag-btn" data-slug="{{ tag.slug }}">{{ tag.text }}</button>
      {% endfor %}
    </div>
  </div>

  <textarea id="checkin-note" class="note-body-textarea small" placeholder="더 하고 싶은 말이 있나요? (선택)"></textarea>

  <button id="submit-checkin" class="btn btn-primary">기록하기</button>
  <p id="checkin-msg" class="checkin-msg"></p>
</div>

<script>
(function() {
  function getCsrfToken() {
    const name = 'csrftoken';
    for (let c of document.cookie.split(';')) {
      const [k, v] = c.trim().split('=');
      if (k === name) return decodeURIComponent(v);
    }
    return '';
  }

  const moodSlider = document.getElementById('mood-slider');
  const energySlider = document.getElementById('energy-slider');
  const moodVal = document.getElementById('mood-val');
  const energyVal = document.getElementById('energy-val');
  moodSlider.addEventListener('input', () => moodVal.textContent = moodSlider.value);
  energySlider.addEventListener('input', () => energyVal.textContent = energySlider.value);

  const selectedTags = new Set();
  document.querySelectorAll('.emotion-tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      btn.classList.toggle('selected');
      if (selectedTags.has(btn.dataset.tag)) selectedTags.delete(btn.dataset.tag);
      else selectedTags.add(btn.dataset.tag);
    });
  });

  const selectedBehaviors = new Set();
  const NO_PATTERN = 'no_pattern';
  document.querySelectorAll('.behavior-tag-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const slug = btn.dataset.slug;
      if (slug === NO_PATTERN) {
        // Selecting no_pattern clears all others
        selectedBehaviors.clear();
        document.querySelectorAll('.behavior-tag-btn').forEach(b => b.classList.remove('selected'));
        selectedBehaviors.add(NO_PATTERN);
        btn.classList.add('selected');
      } else {
        // Selecting any other slug deselects no_pattern
        if (selectedBehaviors.has(NO_PATTERN)) {
          selectedBehaviors.delete(NO_PATTERN);
          document.querySelectorAll('.behavior-tag-btn[data-slug="no_pattern"]').forEach(b => b.classList.remove('selected'));
        }
        if (selectedBehaviors.has(slug)) {
          selectedBehaviors.delete(slug);
          btn.classList.remove('selected');
        } else {
          selectedBehaviors.add(slug);
          btn.classList.add('selected');
        }
      }
    });
  });

  document.getElementById('submit-checkin').addEventListener('click', async () => {
    const payload = {
      mood_score: parseInt(moodSlider.value),
      energy_score: parseInt(energySlider.value),
      emotion_tags: [...selectedTags].join(';'),
      behavior_tags: [...selectedBehaviors].join(';'),
      note: document.getElementById('checkin-note').value,
    };
    const resp = await fetch('{% url "atelier:api_mood_list" %}', {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCsrfToken()},
      body: JSON.stringify(payload),
    });
    if (resp.ok) {
      window.location.href = '{% url "atelier:pulse_home" %}';
    } else {
      document.getElementById('checkin-msg').textContent = '저장에 실패했어요. 다시 시도해 주세요.';
    }
  });
})();
</script>
{% endblock %}
