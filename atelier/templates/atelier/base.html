<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Atelier{% endblock %}</title>
  {% load static %}
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="{% static 'atelier/css/atelier.css' %}">
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js" defer></script>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <header class="atelier-header">
    <nav class="atelier-nav">
      <a class="nav-brand" href="{% url 'atelier:home' %}">Atelier</a>
      <div class="nav-links">
        <a href="{% url 'atelier:spark_list' %}">Spark</a>
        <a href="{% url 'atelier:pulse_home' %}">Pulse</a>
        <a href="{% url 'atelier:studio_home' %}">Studio</a>
      </div>
    </nav>
  </header>
  <main class="atelier-main">
    {% block content %}{% endblock %}
  </main>
  {% block extra_js %}{% endblock %}
  <script>
  (async function() {
    try {
      const res = await fetch('/api/mainpage/fonts', { credentials: 'same-origin' });
      const payload = await res.json();
      if (!payload.ok || !Array.isArray(payload.data)) return;
      for (const font of payload.data) {
        if (!font.url) continue;
        const id = 'bh-font-' + font.id;
        if (document.getElementById(id)) continue;
        const ff = String(font.font_family).replace(/['"\\]/g, '');
        const url = String(font.url).replace(/['"\\]/g, '');
        const fmt = font.format ? ` format('${String(font.format).replace(/['"\\]/g, '')}')` : '';
        const style = document.createElement('style');
        style.id = id;
        style.textContent = `@font-face { font-family: '${ff}'; src: url('${url}')${fmt}; font-display: swap; }`;
        document.head.appendChild(style);
      }
    } catch (err) { console.warn('[Atelier] Font loading failed:', err); }
  })();
  </script>
</body>
</html>
