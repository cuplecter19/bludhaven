{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROFILE | BLUDHAVEN</title>
    <link rel="stylesheet" href="{% static 'accounts/css/signup.css' %}">
</head>
<body>
    <div class="auth-card">
        <a href="{% url 'index' %}" class="brand">BLUDHAVEN</a>
        <h2 class="auth-title">My Profile</h2>
        <p class="auth-sub">프로필 정보를 수정하세요</p>

        {% if messages %}
            {% for message in messages %}
                <div class="message-box {% if message.tags == 'success' %}success{% else %}error{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label class="form-label">프로필 이미지</label>
                <div class="profile-img-preview">
                    {% if user.profile_image %}
                        <img src="{{ user.profile_image.url }}" alt="profile">
                        <div>
                            <label class="delete-image-label">
                                <input type="checkbox" name="delete_image"> 이미지 삭제
                            </label>
                        </div>
                    {% else %}
                        <div class="profile-img-placeholder">No<br>Image</div>
                    {% endif %}
                </div>
                <input type="file" name="profile_image" accept="image/*">
            </div>

            <div class="form-group">
                <label class="form-label">아이디</label>
                <div class="form-info">{{ user.username }} <span style="color:var(--gray);font-size:0.75rem;">(변경 불가)</span></div>
            </div>

            <div class="form-group">
                <label class="form-label">보유 포인트</label>
                <div class="form-info"><span class="points-badge">🪙 {{ user.points }} PT</span></div>
            </div>

            <div class="form-group">
                <label class="form-label" for="nickname">닉네임</label>
                <input type="text" id="nickname" name="nickname" value="{{ user.nickname }}" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="theme">UI 테마</label>
                <select id="theme" name="theme_preference">
                    <option value="default" {% if user.theme_preference == 'default' %}selected{% endif %}>Blüdhaven Night (Blue)</option>
                    <option value="dark" {% if user.theme_preference == 'dark' %}selected{% endif %}>Gotham Shadows (Black)</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-submit btn-submit--grow">저장</button>
                <a href="{% url 'index' %}" class="btn-cancel">취소</a>
            </div>
        </form>
    </div>
    <script>
    (async function() {
        try {
            const res = await fetch('/api/mainpage/fonts', { credentials: 'same-origin' });
            const payload = await res.json();
            if (!payload.ok || !Array.isArray(payload.data)) return;
            for (const font of payload.data) {
                if (!font.url) continue;
                const id = 'bh-font-' + font.id;
                if (document.getElementById(id)) continue;
                const ff = String(font.font_family).replace(/['"\\]/g, '');
                const url = String(font.url).replace(/['"\\]/g, '');
                const fmt = font.format ? ` format('${String(font.format).replace(/['"\\]/g, '')}')` : '';
                const style = document.createElement('style');
                style.id = id;
                style.textContent = `@font-face { font-family: '${ff}'; src: url('${url}')${fmt}; font-display: swap; }`;
                document.head.appendChild(style);
            }
        } catch {}
    })();
    </script>
</body>
</html>
