{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN | Blüdhaven</title>
    <link rel="stylesheet" href="{% static 'accounts/css/common.css' %}">
    <link rel="stylesheet" href="{% static 'accounts/css/login.css' %}">
</head>
<body>
    <div class="auth-card">

        <!-- Editorial masthead -->
        <div class="auth-masthead">
            <div class="masthead-meta">
                <a href="{% url 'index' %}" class="brand">Blüdhaven</a>
                <span class="issue-tag">Member Access</span>
            </div>
            <h1 class="auth-headline">Sign In</h1>
            <div class="botanical-rule"><span>❧</span></div>
            <p class="auth-tagline">학습을 계속하려면 로그인하세요</p>
        </div>

        <!-- Form body -->
        <div class="auth-body">
            {% if messages %}
                {% for message in messages %}
                    <div class="message-box {% if 'error' in message.tags %}error{% else %}success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="id">아이디</label>
                    <input type="text" id="id" name="username" placeholder="username" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="pw">비밀번호</label>
                    <input type="password" id="pw" name="password" placeholder="password" required>
                </div>
                <button type="submit" class="btn-submit">로그인</button>
            </form>
        </div>

        <!-- Footer nav -->
        <p class="auth-footer">처음 오셨나요? <a href="{% url 'accounts:signup' %}">회원가입</a></p>

    </div>
    <script>
    (async function() {
        try {
            const res = await fetch('/api/mainpage/fonts', { credentials: 'same-origin' });
            const payload = await res.json();
            if (!payload.ok || !Array.isArray(payload.data)) return;
            for (const font of payload.data) {
                if (!font.url) continue;
                const id = 'bh-font-' + font.id;
                if (document.getElementById(id)) continue;
                const ff = String(font.font_family).replace(/['"\\]/g, '');
                const url = String(font.url).replace(/['"\\]/g, '');
                const fmt = font.format ? ` format('${String(font.format).replace(/['"\\]/g, '')}')` : '';
                const style = document.createElement('style');
                style.id = id;
                style.textContent = `@font-face { font-family: '${ff}'; src: url('${url}')${fmt}; font-display: swap; }`;
                document.head.appendChild(style);
            }
        } catch {}
    })();
    </script>
</body>
</html>
