{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>SECURITY CLEARANCE | TOYBOX</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'accounts/css/signup.css' %}">
</head>
<body>
    <div class="comic-box">
        <h2>ACCESS GRANTED?</h2>

        {% if messages %}
            {% for message in messages %}
                <div style="background: var(--yellow); color: black; border: 2px solid black; padding: 10px; margin-bottom: 20px; font-weight: bold;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <input type="text" name="username" placeholder="CODENAME (ID)" required>
            </div>
            <div class="form-group">
                <input type="password" name="password" placeholder="SECRET KEY (PW)" required>
            </div>
            <button type="submit">LOGIN TO SYSTEM</button>
        </form>
        
        <p class="footer-text">NEW RECRUIT? <a href="{% url 'accounts:signup' %}">SIGN UP HERE!</a></p>
    </div>
</body>
</html>
