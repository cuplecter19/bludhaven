name: Build and Push to OCIR

on:
  push:
    branches: ["master"]

jobs:
  build-and-push:
    runs-on: ubuntu-24.04  # ✅ 버전 명시 (OCIR 환경과 일치)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 환경 변수 확인 (비민감 정보만)
        run: |
          echo "OCIR_REGION: ${{ secrets.OCIR_REGION }}"
          echo "이미지 태그: ${{ secrets.OCIR_REGION }}/${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_REPO_NAME }}:latest"
          # ✅ USERNAME, PASSWORD는 로그 출력 제거

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGION }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64  # ✅ OCIR 대상 아키텍처 명시 권장
          tags: |
            ${{ secrets.OCIR_REGION }}/${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_REPO_NAME }}:latest
            ${{ secrets.OCIR_REGION }}/${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_REPO_NAME }}:${{ github.sha }}
          cache-from: type=gha   # ✅ GitHub Actions 캐시로 빌드 속도 향상
          cache-to: type=gha,mode=max
