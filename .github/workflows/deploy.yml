name: Build and Push to OCIR

on:
  push:
    branches: ["master"]

jobs:
  build-and-push:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 환경 변수 확인 (비민감 정보만)
        run: |
          echo "OCIR_REGION: ${{ secrets.OCIR_REGION }}"
          echo "이미지 태그: ${{ secrets.OCIR_REGION }}/${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_REPO_NAME }}:latest"

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGION }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.OCIR_REGION }}/${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_REPO_NAME }}:latest
            ${{ secrets.OCIR_REGION }}/${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_REPO_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to OCI VM via SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          printf '%s\n' "$SSH_KEY" > key.pem
          chmod 600 key.pem

          IMAGE="${{ secrets.OCIR_REGION }}/${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_REPO_NAME }}:latest"
          REGISTRY="${{ secrets.OCIR_REGION }}"
          OCIR_USER="${{ secrets.OCIR_USERNAME }}"
          OCIR_PASS="${{ secrets.OCIR_PASSWORD }}"

          ssh -o StrictHostKeyChecking=no -i key.pem "$SSH_USER@$SSH_HOST" "
            export REGISTRY='$REGISTRY'
            export IMAGE='$IMAGE'
            export OCIR_USER='$OCIR_USER'
            export OCIR_PASS='$OCIR_PASS'
            bash -s" << 'EOF'
              echo "$OCIR_PASS" | docker login "$REGISTRY" -u "$OCIR_USER" --password-stdin

              docker pull "$IMAGE"

              # ✅ 실행 중인 모든 컨테이너 정리
              docker stop $(docker ps -q) 2>/dev/null || true
              docker rm $(docker ps -aq) 2>/dev/null || true

              docker run -d -p 80:80 --restart unless-stopped "$IMAGE"
              docker image prune -f
          EOF

          rm -f key.pem
