{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUDHAVEN</title>
    <link rel="stylesheet" href="{% static 'core/css/index.css' %}">
    {% if is_admin %}
    <link rel="stylesheet" href="{% static 'core/css/admin_panel.css' %}">
    {% endif %}
</head>
<body>
    <div id="scene-root" aria-live="polite"></div>

    {% if is_admin %}
    <aside id="editor-panel" class="editor-panel" hidden>
        <div id="editor-panel-resize-top" class="editor-panel__resize-handle editor-panel__resize-handle--top"></div>
        <div id="editor-panel-handle" class="editor-panel__handle">EDITOR</div>
        <div class="editor-panel__body">
        <div class="editor-panel__section">
            <label>Scene</label>
            <select id="scene-select"></select>
            <button id="scene-new-btn" type="button">새 씬</button>
            <button id="scene-activate-btn" type="button">활성화</button>
        </div>

        <div class="editor-panel__section">
            <label>Viewport</label>
            <select id="viewport-mode-select">
                <option value="both">Both</option>
                <option value="desktop">Desktop</option>
                <option value="mobile">Mobile</option>
            </select>
            <button id="save-draft-btn" type="button">저장</button>
            <button id="revision-save-btn" type="button">리비전 저장</button>
        </div>

        <div class="editor-panel__section editor-panel__section--toolbar">
            <button id="undo-btn" type="button">Undo</button>
            <button id="redo-btn" type="button">Redo</button>
            <button id="sticker-mode-btn" type="button">스티커 편집</button>
            <span id="dirty-indicator" class="dirty-indicator">Saved</span>
        </div>

        <div class="editor-panel__section">
            <label>레이어 추가</label>
            <select id="new-layer-type">
                <option value="bg_image">bg_image</option>
                <option value="parallax_far">parallax_far</option>
                <option value="bg_text">bg_text</option>
                <option value="main_image">main_image</option>
                <option value="text">text</option>
                <option value="clock">clock</option>
                <option value="menu_button">menu_button</option>
                <option value="user_profile">user_profile</option>
                <option value="sticker">sticker</option>
                <option value="parallax_near">parallax_near</option>
                <option value="parallax_ultra_near">parallax_ultra_near</option>
            </select>
            <button id="add-layer-btn" type="button">추가</button>
        </div>

        <div class="editor-panel__section">
            <label>레이어 목록</label>
            <ul id="layer-list" class="layer-list"></ul>
        </div>

        <div class="editor-panel__section">
            <label>에셋 업로드</label>
            <input type="file" id="asset-file-input" accept="image/*">
            <select id="asset-kind-select">
                <option value="background">background</option>
                <option value="main">main</option>
                <option value="parallax">parallax</option>
                <option value="sticker">sticker</option>
                <option value="generic">generic</option>
            </select>
            <button id="asset-upload-btn" type="button">업로드</button>
            <label for="asset-url-input">외부 이미지 URL</label>
            <input type="text" id="asset-url-input" placeholder="외부 이미지 URL (http/https)">
            <button id="asset-url-upload-btn" type="button">URL 업로드</button>
        </div>

        <div class="editor-panel__section" id="font-management-section" hidden>
            <label>폰트 관리</label>
            <input id="font-name-input" type="text" placeholder="폰트 이름">
            <input id="font-family-input" type="text" placeholder="font-family 값">
            <input id="font-url-input" type="text" placeholder="웹폰트 URL">
            <button id="font-url-register-btn" type="button">URL 등록</button>
            <hr>
            <input id="font-file-name-input" type="text" placeholder="폰트 이름">
            <input id="font-file-family-input" type="text" placeholder="font-family 값">
            <input id="font-file-input" type="file" accept=".woff,.woff2,.ttf,.otf">
            <button id="font-file-upload-btn" type="button">파일 업로드</button>
            <hr>
            <ul id="font-list" class="font-list"></ul>
        </div>

        <div class="editor-panel__section" id="asset-library-section" hidden>
            <label>에셋 라이브러리</label>

            <!-- 카테고리 탭 -->
            <div class="asset-tabs">
                <button class="asset-tab is-active" data-kind="background">BG</button>
                <button class="asset-tab" data-kind="main">Main</button>
                <button class="asset-tab" data-kind="parallax">Parallax</button>
                <button class="asset-tab" data-kind="sticker">Sticker</button>
                <button class="asset-tab" data-kind="generic">기타</button>
            </div>

            <!-- 썸네일 그리드 -->
            <div id="asset-thumb-grid" class="asset-thumb-grid"></div>
        </div>

        <div class="editor-panel__section">
            <label>선택 레이어 속성</label>
            <div class="grid-form">
                <!-- type="text"로 변경 → "50%", "200px", "200" 모두 입력 가능 -->
                <label>X</label><input id="prop-x" type="text" placeholder="ex) 10px, 5%">
                <label>Y</label><input id="prop-y" type="text" placeholder="ex) 10px, 5%">
                <label>W</label><input id="prop-width"  type="text" placeholder="ex) 200px, 100%">
                <label>H</label><input id="prop-height" type="text" placeholder="ex) 200px, 100%">
                <label>Rotate</label><input id="prop-rotation" type="number" step="0.1">
                <label>Scale</label><input id="prop-scale" type="number" step="0.01" min="0.01">
                <label>Opacity</label><input id="prop-opacity" type="number" step="0.01" min="0" max="1">
                <label>Z</label><input id="prop-z" type="number" step="1" min="0">
                <label>Text</label><input id="prop-text" type="text">
                <div id="text-style-section" class="text-style-section" hidden>
                    <label>Font Family</label>
                    <select id="prop-font-family">
                        <option value="">-- 기본 폰트 --</option>
                    </select>
                    <label>Font Weight</label>
                    <select id="prop-font-weight">
                        <option value="">-- 기본 두께 --</option>
                        <option value="300">300</option>
                        <option value="400">400</option>
                        <option value="700">700</option>
                        <option value="900">900</option>
                    </select>
                    <label>Style</label>
                    <div class="toggle-row">
                        <button id="toggle-italic" type="button">Italic</button>
                        <button id="toggle-underline" type="button">Underline</button>
                        <button id="toggle-strikethrough" type="button">Strike</button>
                    </div>
                    <label>Size Mode</label>
                    <select id="prop-size-mode">
                        <option value="font">font</option>
                        <option value="box">box</option>
                    </select>
                    <label>Font Size</label><input id="prop-font-size" type="text" placeholder="ex) 48px">
                    <label>Letter Spacing</label><input id="prop-letter-spacing" type="text" placeholder="ex) 0.02em">
                    <label>Line Height</label><input id="prop-line-height" type="number" step="0.1" min="0">
                    <label>Text Color</label>
                    <div class="color-input-row">
                        <input id="prop-text-color" type="color">
                        <input id="prop-text-color-text" type="text" placeholder="#ffffff">
                    </div>
                    <label>Border Width</label><input id="prop-border-width" type="number" step="1" min="0" max="50">
                    <label>Border Style</label>
                    <select id="prop-border-style">
                        <option value="solid">solid</option>
                        <option value="dashed">dashed</option>
                        <option value="dotted">dotted</option>
                    </select>
                    <label>Border Color</label>
                    <div class="color-input-row">
                        <input id="prop-border-color" type="color">
                        <input id="prop-border-color-text" type="text" placeholder="#000000">
                    </div>
                    <div id="clock-font-size-section" class="clock-font-size-section" hidden>
                        <label>Time Font Size</label><input id="prop-time-font-size" type="text" placeholder="ex) 48px">
                        <label>Date Font Size</label><input id="prop-date-font-size" type="text" placeholder="ex) 16px">
                    </div>
                </div>
                <label>URL</label><input id="prop-url" type="text">
                <label>Asset URL</label><input id="prop-asset" type="text">
                    <!-- 이미지 fit 설정 -->
                    <label>Fit</label>
                    <select id="prop-fit">
                    <option value="cover">cover (꽉채우기)</option>
                    <option value="contain">contain (비율유지)</option>
                    <option value="fill">fill (늘리기)</option>
                    <option value="none">none</option>
                </select>
            </div>
            <button id="prop-apply-btn" type="button">적용</button>
            <button id="layer-delete-btn" type="button" class="danger">삭제</button>
        </div>

        <div id="editor-error" class="editor-error" hidden></div>
        </div><!-- /.editor-panel__body -->
        <div id="editor-panel-resize-bottom" class="editor-panel__resize-handle editor-panel__resize-handle--bottom"></div>
    </aside>
    {% endif %}

    <script>
      window.__CORE_MAINPAGE__ = {
        isAdmin: {{ is_admin|yesno:"true,false" }}
      };
    </script>
    <script type="module" src="{% static 'core/js/index.js' %}"></script>
</body>
</html>
