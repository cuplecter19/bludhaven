{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLUDHAVEN</title>
    <link rel="stylesheet" href="{% static 'core/css/index.css' %}">
    {% if is_admin %}
    <link rel="stylesheet" href="{% static 'core/css/admin_panel.css' %}">
    {% endif %}
</head>
<body>
    <div id="scene-root" aria-live="polite"></div>

    {% if is_admin %}
    <aside id="editor-panel" class="editor-panel" hidden>
        <div id="editor-panel-handle" class="editor-panel__handle">EDITOR</div>

        <div class="editor-panel__section">
            <label>Scene</label>
            <select id="scene-select"></select>
            <button id="scene-new-btn" type="button">새 씬</button>
            <button id="scene-activate-btn" type="button">활성화</button>
        </div>

        <div class="editor-panel__section">
            <label>Viewport</label>
            <select id="viewport-mode-select">
                <option value="both">Both</option>
                <option value="desktop">Desktop</option>
                <option value="mobile">Mobile</option>
            </select>
            <button id="save-draft-btn" type="button">저장</button>
            <button id="revision-save-btn" type="button">리비전 저장</button>
        </div>

        <div class="editor-panel__section editor-panel__section--toolbar">
            <button id="undo-btn" type="button">Undo</button>
            <button id="redo-btn" type="button">Redo</button>
            <button id="sticker-mode-btn" type="button">스티커 편집</button>
            <span id="dirty-indicator" class="dirty-indicator">Saved</span>
        </div>

        <div class="editor-panel__section">
            <label>레이어 추가</label>
            <select id="new-layer-type">
                <option value="bg_image">bg_image</option>
                <option value="parallax_far">parallax_far</option>
                <option value="bg_text">bg_text</option>
                <option value="main_image">main_image</option>
                <option value="text">text</option>
                <option value="clock">clock</option>
                <option value="menu_button">menu_button</option>
                <option value="sticker">sticker</option>
                <option value="parallax_near">parallax_near</option>
                <option value="parallax_ultra_near">parallax_ultra_near</option>
            </select>
            <button id="add-layer-btn" type="button">추가</button>
        </div>

        <div class="editor-panel__section">
            <label>에셋 업로드</label>
            <input type="file" id="asset-file-input" accept="image/*">
            <select id="asset-kind-select">
                <option value="background">background</option>
                <option value="main">main</option>
                <option value="parallax">parallax</option>
                <option value="sticker">sticker</option>
                <option value="generic">generic</option>
            </select>
            <button id="asset-upload-btn" type="button">업로드</button>
        </div>

        <div class="editor-panel__section">
            <label>레이어 목록</label>
            <ul id="layer-list" class="layer-list"></ul>
        </div>

        <div class="editor-panel__section">
            <label>선택 레이어 속성</label>
            <div class="grid-form">
                <!-- type="text"로 변경 → "50%", "200px", "200" 모두 입력 가능 -->
                <label>X</label><input id="prop-x" type="text" placeholder="ex) 10px, 5%">
                <label>Y</label><input id="prop-y" type="text" placeholder="ex) 10px, 5%">
                <label>W</label><input id="prop-width"  type="text" placeholder="ex) 200px, 100%">
                <label>H</label><input id="prop-height" type="text" placeholder="ex) 200px, 100%">
                <label>Rotate</label><input id="prop-rotation" type="number" step="0.1">
                <label>Scale</label><input id="prop-scale" type="number" step="0.01" min="0.01">
                <label>Opacity</label><input id="prop-opacity" type="number" step="0.01" min="0" max="1">
                <label>Z</label><input id="prop-z" type="number" step="1" min="0">
                <label>Text</label><input id="prop-text" type="text">
                <label>URL</label><input id="prop-url" type="text">
                <label>Asset URL</label><input id="prop-asset" type="text">
                    <!-- 이미지 fit 설정 -->
                    <label>Fit</label>
                    <select id="prop-fit">
                    <option value="cover">cover (꽉채우기)</option>
                    <option value="contain">contain (비율유지)</option>
                    <option value="fill">fill (늘리기)</option>
                    <option value="none">none</option>
                </select>
            </div>
            <button id="prop-apply-btn" type="button">적용</button>
            <button id="layer-delete-btn" type="button" class="danger">삭제</button>
        </div>

        <div id="editor-error" class="editor-error" hidden></div>
    </aside>
    {% endif %}

    <script>
      window.__CORE_MAINPAGE__ = {
        isAdmin: {{ is_admin|yesno:"true,false" }}
      };
    </script>
    <script type="module" src="{% static 'core/js/index.js' %}"></script>
</body>
</html>
